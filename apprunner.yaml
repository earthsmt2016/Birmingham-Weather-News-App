version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm install -g pnpm@11.8.0
    build:
      - pnpm install --frozen-lockfile
      - pnpm --filter @workspace/backend run build
run:
  command: node apps/api/dist/index.mjs
  network:
    port: 5001
  env:
    - name: NODE_ENV
      value: "production"
    - name: HOST
      value: "0.0.0.0"
