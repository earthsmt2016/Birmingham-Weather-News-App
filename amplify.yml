version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@11.8.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm run amplify:build
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - ~/.pnpm-store/**/*
