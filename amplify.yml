version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@11.8.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @workspace/frontend run typecheck
            - pnpm --filter @workspace/frontend run build
      artifacts:
        baseDirectory: apps/web/dist/public
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - ~/.pnpm-store/**/*
